
services:
  db:
    image: mysql:9
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - .docker/mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: rdn
      MYSQL_PASSWORD: rdn
      MYSQL_USER: rdn

  phpmyadmin:
    image: phpmyadmin:5
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: mysql
      PMA_USER: rdn
      PMA_PASSWORD: rdn
